name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm install

      - name: Verify debug keystore exists
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            mkdir -p android/app
            keytool -genkey -v -keystore android/app/debug.keystore \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias androiddebugkey -keypass android \
              -storepass android \
              -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Debug keystore already exists"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Find and Upload Release APK
        if: always()
        run: |
          # Find the release APK (handle both signed and unsigned variants)
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "Found app-release.apk"
            ls -lh android/app/build/outputs/apk/release/app-release.apk
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "Found app-release-unsigned.apk"
            ls -lh android/app/build/outputs/apk/release/app-release-unsigned.apk
          else
            echo "No release APK found, listing directory:"
            find android/app/build/outputs -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB files found"
          fi

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-app-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
        continue-on-error: true
